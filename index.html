<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منار.. قصة لا تنتهي 💙</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Tahoma', sans-serif; }
        canvas { display: block; }

        #gate {
            position: fixed; inset: 0; background: #000; z-index: 100;
            display: flex; justify-content: center; align-items: center; cursor: pointer;
        }
        .gate-btn {
            color: #4fc3f7; border: 1px solid #4fc3f7; padding: 15px 40px;
            border-radius: 30px; font-size: 1.2rem; box-shadow: 0 0 15px rgba(79, 195, 247, 0.3);
        }

        #story-layer {
            position: fixed; inset: 0; display: flex; justify-content: center;
            align-items: center; pointer-events: none; z-index: 10;
        }

        .message {
            position: absolute; color: white; text-align: center;
            opacity: 0; transition: opacity 2s, transform 2s; max-width: 85%;
        }

        /* رسالة الحب النهائية */
        #final-love-note {
            position: absolute; bottom: 15%; width: 100%; text-align: center;
            color: #4fc3f7; font-size: 1.3rem; opacity: 0; transition: 4s;
            line-height: 1.8; text-shadow: 0 0 10px rgba(79, 195, 247, 0.5);
            padding: 0 20px; box-sizing: border-box;
        }
    </style>
</head>
<body>

<div id="gate" onclick="initExperience()">
    <div class="gate-btn">ادخلي الى  عالمي ✨</div>
</div>

<div id="story-layer">
    <div class="message" id="m1" style="font-size: 1.5rem;">في هذا الكون الواسع.. كانت الصدفة هي البداية</div>
    <div class="message" id="m2" style="font-size: 1.5rem;">لم تكوني يوماً رقماً في سجل هاتفي..</div>
    <div class="message" id="m3" style="font-size: 1.5rem;">بل كنتِ النور الذي أضاء عتمة أيامي</div>
    <div class="message" id="m4" style="font-size: 3.5rem; font-weight: bold; color: #4fc3f7;">منار المادي</div>
</div>

<div id="final-love-note">
    "أنتِ الوردة التي ستبقى تُزهر في قلبي،<br>
    بيننا مسافات.. لكنكِ أقرب إليّ من نبضي. 💙"
</div>

<audio id="audio" loop>
    <source src="music.mpeg" type="audio/mpeg">
</audio>

<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let state = "intro"; 
    let startTime = 0;

    function setup() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    class Particle {
        constructor(x, y, tx, ty) {
            this.x = x; this.y = y;
            this.tx = tx; this.ty = ty;
            this.size = Math.random() * 1.5 + 0.5;
            this.acc = 0.05;
        }
        update() {
            this.x += (this.tx - this.x) * this.acc;
            this.y += (this.ty - this.y) * this.acc;
        }
        draw() {
            ctx.fillStyle = "#4fc3f7";
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
            ctx.fill();
        }
    }

    async function showMessage(id, duration) {
        const el = document.getElementById(id);
        el.style.opacity = 1;
        el.style.transform = "translateY(-20px)";
        await new Promise(r => setTimeout(r, duration));
        el.style.opacity = 0;
        await new Promise(r => setTimeout(r, 1000));
    }

    function createNameParticles() {
        particles = [];
        ctx.fillStyle = "white";
        ctx.font = `bold ${Math.min(canvas.width*0.22, 85)}px Tahoma`;
        ctx.textAlign = "center";
        ctx.fillText("منار", canvas.width/2, canvas.height/2);
        
        const data = ctx.getImageData(0,0,canvas.width, canvas.height).data;
        ctx.clearRect(0,0,canvas.width, canvas.height);

        for(let y=0; y<canvas.height; y+=6) {
            for(let x=0; x<canvas.width; x+=6) {
                if(data[(y*canvas.width + x)*4 + 3] > 128) {
                    particles.push(new Particle(Math.random()*canvas.width, Math.random()*canvas.height, x, y));
                }
            }
        }
    }

    // دالة رسم الوردة الرياضية
    function transitionToRose() {
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2 - 50;
        const k = 5; // عدد البتلات
        const scale = Math.min(canvas.width, canvas.height) * 0.35;

        particles.forEach((p, index) => {
            let t = (index / particles.length) * Math.PI * 2 * 2;
            let r = scale * Math.cos(k * t);
            let tx = centerX + r * Math.cos(t);
            let ty = centerY + r * Math.sin(t);
            
            p.tx = tx;
            p.ty = ty;
            p.acc = 0.08; // حركة أهدأ عند رسم الوردة
        });

        // تشغيل الاهتزاز النبضي
        setInterval(() => {
            if (navigator.vibrate) navigator.vibrate([100, 150]);
        }, 1500);

        // إظهار الرسالة الرومانسية
        setTimeout(() => {
            document.getElementById('final-love-note').style.opacity = 1;
        }, 2000);
    }

    function animate() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
    }

    async function initExperience() {
        document.getElementById('gate').style.display = "none";
        document.getElementById('audio').play();
        setup();
        animate();

        await showMessage('m1', 4000);
        await showMessage('m2', 4000);
        await showMessage('m3', 4000);
        
        createNameParticles();
        await showMessage('m4', 6000);
        
        // الانتقال للوردة
        transitionToRose();
    }

    window.onresize = setup;
</script>
</body>
</html>
