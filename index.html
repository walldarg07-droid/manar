<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إليكِ.. 💙</title>
    <style>
        :root {
            --primary-color: #4fc3f7;
            --text-color: #e0e1dd;
        }

        body {
            margin: 0;
            background: #000;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            touch-action: none;
        }

        /* شاشة البداية الغامضة */
        #overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, #001219 0%, #000 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 2s ease;
        }

        .start-circle {
            width: 100px;
            height: 100px;
            border: 1px solid var(--primary-color);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--primary-color);
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(79, 195, 247, 0.2);
            animation: breath 3s infinite ease-in-out;
        }

        @keyframes breath {
            0%, 100% { transform: scale(1); opacity: 0.4; }
            50% { transform: scale(1.1); opacity: 1; box-shadow: 0 0 40px rgba(79, 195, 247, 0.4); }
        }

        canvas { display: block; }

        /* طبقة المشاعر */
        .story-container {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            padding: 40px;
            text-align: center;
        }

        .fade-text {
            opacity: 0;
            transition: opacity 1.5s ease, transform 1.5s ease;
            transform: translateY(10px);
            color: var(--text-color);
            text-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        .name-highlight {
            font-size: 3.5rem;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 30px;
            filter: drop-shadow(0 0 15px rgba(79, 195, 247, 0.5));
        }

        .quote-text {
            font-size: 1.3rem;
            line-height: 1.8;
            letter-spacing: 1px;
        }

        #final-heart {
            position: absolute;
            font-size: 80px;
            opacity: 0;
            transition: 3s ease;
            filter: drop-shadow(0 0 20px var(--primary-color));
        }
    </style>
</head>
<body>

<div id="overlay" onclick="startJourney()">
    <div class="start-circle">المس القلب</div>
</div>

<canvas id="scene"></canvas>

<div class="story-container">
    <div id="name-part" class="fade-text name-highlight">منار المادي</div>
    <div id="text-part" class="fade-text quote-text"></div>
    <div id="final-heart">💙</div>
</div>

<audio id="music" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/02/22/audio_d1be8269e0.mp3" type="audio/mpeg">
</audio>

<script>
    const canvas = document.getElementById('scene');
    const ctx = canvas.getContext('2d');
    const music = document.getElementById('music');
    let particles = [];
    let touch = { x: -100, y: -100 };

    // تهيئة الشاشة
    function init() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    class Particle {
        constructor(x, y, tx, ty) {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.tx = tx;
            this.ty = ty;
            this.size = Math.random() * 1.5 + 0.5;
            this.acc = 0.05;
            this.v = 0.9;
        }

        draw() {
            ctx.fillStyle = '#4fc3f7';
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }

        update() {
            this.x += (this.tx - this.x) * this.acc;
            this.y += (this.ty - this.y) * this.acc;
            
            // تفاعل بسيط عند اللمس
            let dx = touch.x - this.x;
            let dy = touch.y - this.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            if(dist < 60) {
                this.x -= dx * 0.1;
                this.y -= dy * 0.1;
            }
        }
    }

    function createName() {
        ctx.fillStyle = "white";
        ctx.font = `bold ${Math.min(canvas.width * 0.22, 90)}px Tahoma`;
        ctx.textAlign = "center";
        ctx.fillText("منار", canvas.width/2, canvas.height/2);

        const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        for (let y = 0; y < canvas.height; y += 6) {
            for (let x = 0; x < canvas.width; x += 6) {
                if (data[(y * canvas.width + x) * 4 + 3] > 128) {
                    particles.push(new Particle(x, y, x, y));
                }
            }
        }
    }

    function animate() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.15)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
    }

    async function playStory() {
        const namePart = document.getElementById('name-part');
        const textPart = document.getElementById('text-part');
        const heart = document.getElementById('final-heart');

        // المرحلة 1: ظهور الاسم
        await new Promise(r => setTimeout(r, 1000));
        namePart.style.opacity = 1;
        namePart.style.transform = "translateY(0)";

        // المرحلة 2: الكلمات المتتالية
        const phrases = [
            "في زحام الأصوات..",
            "كان صوتكِ هو السكينة.",
            "لم تكوني يوماً مجرد عابر..",
            "بل كنتِ الأثر الذي غيّر مجرى القصة."
        ];

        for (let p of phrases) {
            textPart.style.opacity = 0;
            await new Promise(r => setTimeout(r, 1000));
            textPart.innerText = p;
            textPart.style.opacity = 1;
            await new Promise(r => setTimeout(r, 3000));
        }

        // المرحلة النهائية: النبض والختام
        namePart.style.opacity = 0;
        textPart.style.opacity = 0;
        await new Promise(r => setTimeout(r, 2000));
        
        heart.style.opacity = 1;
        heart.style.transform = "scale(1.5)";
        
        // محاكاة نبض القلب بالاهتزاز
        setInterval(() => {
            if ("vibrate" in navigator) navigator.vibrate([100, 100]);
        }, 2000);
    }

    function startJourney() {
        document.getElementById('overlay').style.opacity = 0;
        setTimeout(() => document.getElementById('overlay').remove(), 2000);
        
        music.volume = 0.6;
        music.play();
        
        init();
        createName();
        animate();
        playStory();
    }

    window.addEventListener('touchstart', (e) => {
        touch.x = e.touches[0].clientX;
        touch.y = e.touches[0].clientY;
    });
</script>

</body>
</html>
