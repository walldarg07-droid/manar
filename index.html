<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منار 💙</title>
    <style>
        body {
            margin: 0;
            background: #000;
            overflow: hidden;
            font-family: 'Tahoma', sans-serif;
            color: #fff;
            touch-action: none;
        }

        /* شاشة البدء */
        .start-overlay {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .start-btn {
            padding: 15px 45px;
            border: 2px solid #4fc3f7;
            border-radius: 50px;
            color: #4fc3f7;
            font-size: 1.3rem;
            background: rgba(79, 195, 247, 0.1);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        canvas { display: block; position: absolute; top: 0; left: 0; }

        /* حاوية النصوص مع معالجة المسافات */
        .ui-container {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center; /* توسيط عمودي */
            align-items: center;
            pointer-events: none;
            z-index: 5;
        }

        .name-header {
            font-size: 3rem;
            color: #4fc3f7;
            text-shadow: 0 0 15px rgba(79, 195, 247, 0.6);
            opacity: 0;
            margin-bottom: 40px; /* مسافة إجبارية تحت الاسم */
            transition: 2s ease;
        }

        /* تعديل المسافات بين كلمات الجملة الواحدة */
        .typewriter-content {
            font-size: 1.2rem;
            color: #e0e0e0;
            text-align: center;
            line-height: 1.8;
            max-width: 85%;
            word-spacing: 4px; /* إضافة مساحة إضافية بين الكلمات */
            letter-spacing: 0.5px;
            min-height: 4em;
        }
    </style>
</head>
<body>

<div class="start-overlay" id="overlay" onclick="bootExperience()">
    <div class="start-btn">ابدأ التجربة ✨</div>
</div>

<canvas id="galaxy"></canvas>

<div class="ui-container">
    <h1 id="mainTitle" class="name-header">منار المادي</h1>
    <div id="subText" class="typewriter-content"></div>
</div>

<!-- رابط صوت بديل وموثوق -->
<audio id="bgMusic" loop>
    <source src="https://cdn.pixabay.com/download/audio/2021/11/25/audio_91b32e02d9.mp3" type="audio/mpeg">
</audio>

<script>
    const canvas = document.getElementById('galaxy');
    const ctx = canvas.getContext('2d');
    const music = document.getElementById('bgMusic');
    
    let particles = [];
    let isLive = false;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    function createStars() {
        ctx.fillStyle = "white";
        let fontSize = Math.min(canvas.width * 0.2, 70);
        ctx.font = `bold ${fontSize}px Tahoma`;
        ctx.textAlign = "center";
        ctx.fillText("منار", canvas.width/2, canvas.height/2);

        const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        particles = [];
        for (let y = 0; y < canvas.height; y += 7) {
            for (let x = 0; x < canvas.width; x += 7) {
                const i = (y * canvas.width + x) * 4;
                if (data[i+3] > 128) {
                    particles.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        tx: x, ty: y
                    });
                }
            }
        }
    }

    function render() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.15)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = "#4fc3f7";
        particles.forEach(p => {
            p.x += (p.tx - p.x) * 0.08;
            p.y += (p.ty - p.y) * 0.08;
            ctx.beginPath();
            ctx.arc(p.x, p.y, 1.2, 0, Math.PI*2);
            ctx.fill();
        });
        requestAnimationFrame(render);
    }

    async function startStory() {
        const phrases = [
            "كانت مجرد مكالمة عادية...",
            "لكنها تحولت إلى أجمل قصة.",
            "منار... وجودكِ يملأ المكان نوراً. 💙"
        ];
        
        const textEl = document.getElementById('subText');
        document.getElementById('mainTitle').style.opacity = "1";

        for (let phrase of phrases) {
            textEl.innerText = "";
            // إضافة مسافات واضحة أثناء الكتابة
            for (let char of phrase) {
                textEl.innerText += char;
                await new Promise(r => setTimeout(r, 80));
            }
            await new Promise(r => setTimeout(r, 2500));
        }
    }

    function bootExperience() {
        if (isLive) return;
        isLive = true;

        document.getElementById('overlay').style.display = "none";
        
        // تشغيل الموسيقى - الأندرويد يتطلب تفاعل المستخدم أولاً
        music.play().catch(() => {
            console.log("المتصفح منع التشغيل التلقائي");
        });

        // تشغيل الاهتزاز (تأكد أن الهاتف ليس في وضع الصامت)
        if ("vibrate" in navigator) {
            navigator.vibrate([200, 100, 200]);
        }

        resize();
        createStars();
        render();
        startStory();
    }

    window.addEventListener('resize', () => {
        if (isLive) {
            resize();
            createStars();
        }
    });
</script>

</body>
</html>
