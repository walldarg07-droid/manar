<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منار 💙</title>
    <style>
        body {
            margin: 0;
            background: #000;
            overflow: hidden;
            font-family: 'Tahoma', sans-serif;
            color: #fff;
            touch-action: none;
        }

        /* شاشة البدء - ضرورية لتفعيل الصوت والاهتزاز */
        .start-overlay {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .start-btn {
            padding: 20px 40px;
            border: 2px solid #4fc3f7;
            border-radius: 50px;
            color: #4fc3f7;
            font-size: 1.5rem;
            background: rgba(79, 195, 247, 0.1);
            box-shadow: 0 0 20px rgba(79, 195, 247, 0.3);
        }

        canvas { display: block; position: absolute; top: 0; left: 0; }

        /* تنظيم النصوص لمنع الالتصاق */
        .content-container {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* توزيع العناصر بعيداً عن بعضها */
            align-items: center;
            padding: 60px 20px;
            pointer-events: none;
            box-sizing: border-box;
        }

        .main-name {
            font-size: 3rem;
            margin: 0;
            color: #4fc3f7;
            text-shadow: 0 0 20px #0288d1;
            opacity: 0;
            transition: 3s;
        }

        .typewriter-text {
            font-size: 1.1rem;
            color: #e0e0e0;
            text-align: center;
            line-height: 1.8;
            max-width: 90%;
            min-height: 4em; /* مساحة ثابتة لمنع القفز */
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="start-overlay" id="overlay" onclick="launch()">
    <div class="start-btn">بدء التجربة ✨</div>
</div>

<canvas id="stage"></canvas>

<div class="content-container">
    <h1 id="nameDisplay" class="main-name">منار المادي</h1>
    <div id="textDisplay" class="typewriter-text"></div>
</div>

<!-- رابط موسيقى بديل ومباشر لضمان العمل -->
<audio id="player" crossorigin="anonymous" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>
    const canvas = document.getElementById('stage');
    const ctx = canvas.getContext('2d');
    const audio = document.getElementById('player');
    
    let particles = [];
    let isStarted = false;

    function init() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    // دالة الاهتزاز مع تكرار لضمان عملها على أندرويد
    function triggerVibration() {
        if ("vibrate" in navigator) {
            navigator.vibrate([100, 50, 100]); 
        }
    }

    function createParticles() {
        ctx.fillStyle = "white";
        let size = Math.min(canvas.width * 0.2, 80);
        ctx.font = `bold ${size}px Tahoma`;
        ctx.textAlign = "center";
        ctx.fillText("منار", canvas.width/2, canvas.height/2);

        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        particles = [];
        for (let y = 0; y < canvas.height; y += 6) {
            for (let x = 0; x < canvas.width; x += 6) {
                const i = (y * canvas.width + x) * 4;
                if (imgData[i+3] > 128) {
                    particles.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        tx: x, ty: y,
                        vx: 0, vy: 0
                    });
                }
            }
        }
    }

    function draw() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = "#4fc3f7";
        particles.forEach(p => {
            p.x += (p.tx - p.x) * 0.07;
            p.y += (p.ty - p.y) * 0.07;
            ctx.beginPath();
            ctx.arc(p.x, p.y, 1.5, 0, Math.PI*2);
            ctx.fill();
        });
        requestAnimationFrame(draw);
    }

    async function runText() {
        const lines = [
            "كانت مجرد مكالمة عابرة...",
            "لكنها صنعت قصة لن تنتهي.",
            "منار... وجودكِ يضيء كل شيء. 💙"
        ];
        
        const display = document.getElementById('textDisplay');
        document.getElementById('nameDisplay').style.opacity = "1";

        for (let line of lines) {
            display.innerText = "";
            for (let char of line) {
                display.innerText += char;
                await new Promise(r => setTimeout(r, 60));
            }
            await new Promise(r => setTimeout(r, 2500));
        }
    }

    function launch() {
        if (isStarted) return;
        isStarted = true;

        // إخفاء الشاشة وتفعيل الصوت
        document.getElementById('overlay').style.display = "none";
        
        // محاولة تشغيل الصوت
        audio.play().catch(e => console.log("Audio failed:", e));
        
        // تفعيل الاهتزاز
        triggerVibration();

        init();
        createParticles();
        draw();
        runText();
    }

    window.addEventListener('resize', () => {
        if (isStarted) {
            init();
            createParticles();
        }
    });
</script>

</body>
</html>
